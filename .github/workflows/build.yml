name: Build CapCut AI GOD APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger = one click build

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x android-app/gradlew

    - name: Build Debug APK
      run: |
        cd android-app
        ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Build Release APK (signed with debug key)
      run: |
        cd android-app
        ./gradlew assembleRelease --no-daemon

    - name: Rename APK
      run: |
        mkdir -p output
        cp android-app/app/build/outputs/apk/debug/app-debug.apk output/CapCutAI-GOD-debug.apk
        cp android-app/app/build/outputs/apk/release/app-release-unsigned.apk output/CapCutAI-GOD-release.apk 2>/dev/null || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: CapCutAI-GOD-APK
        path: output/
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "CapCut AI GOD v${{ github.run_number }}"
        body: |
          ## ⚡ CapCut AI GOD - Auto Build
          
          **By R4X**
          
          ### Features:
          - 🤖 AI Vision Loop (OpenRouter)
          - 🎯 Floating Overlay Button
          - 🔗 Shizuku ADB Bridge
          - 🎬 CapCut Full Automation
          - ♿ Accessibility Service
          - 🔌 Python Bot Socket Server (port 9999)
          
          ### Setup:
          1. Install APK
          2. Grant overlay + accessibility permissions
          3. Open app → Start Bot Server
          4. Run `python capcut_bot.py` in Termux
          
          **Requires:** Shizuku running, Android 9+
        files: output/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
